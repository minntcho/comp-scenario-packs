name: scenario-contracts

on:
  pull_request:
  push:
    branches: [main]

jobs:
  public-scenario-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q
      - name: Run scenario suite
        run: python -m comp_scenario_packs.cli run-all --scenarios-dir scenarios --reports-dir reports
      - name: Run benchmark smoke
        run: python -m comp_scenario_packs.cli bench-smoke --scenarios-dir scenarios --report benchmarks/latest.json
      - name: Run replay scale smoke
        run: python -m comp_scenario_packs.cli bench-replay-scale scenarios/public_projection_smoke/scenario.json --rows 1,10 --report benchmarks/replay-scale.json
