schema_version: 1
authoring_id: supplier_evidence_review.v1
status: authoring-seed
authority_policy: compatibility_signal_not_authority_source
public_surfaces:
  - comp.scenario_contracts
  - comp.persistence

base_case:
  id: supplier_evidence_review.accepted.v1
  intent:
    path: accepted
    pressure_targets:
      - canonical_binding
      - evidence_matching
      - public_projection_gate
  claim:
    supplier: alpha_metal
    site: plant_alpha_a
    component: battery_housing_plate
    period: 2026-01
    activity:
      kind: electricity
      amount: 8400
      unit: kWh
  evidence:
    invoice:
      id: INV-001
      amount: 8400
      unit: kWh
      period: 2026-01
      relation_to_claim: supports
    meter_log:
      id: MTR-001
      amount: 8400
      unit: kWh
      period: 2026-01
      relation_to_claim: supports

rendering:
  sentence_template: supplier_evidence_review.default
  generated_text_is_authoritative: false

grammar:
  allowed_paths:
    - claim.supplier
    - claim.site
    - claim.component
    - claim.period
    - claim.activity.amount
    - evidence.invoice
    - evidence.invoice.amount
    - evidence.invoice.period
    - evidence.meter_log.amount
    - evidence.meter_log.period
  relations:
    supplier_binding:
      normal: resolved
      mutations:
        - unresolved_alias
        - ambiguous_alias
    invoice_supports_claim:
      normal: supports_claim_amount_period_supplier
      mutations:
        - missing_invoice
        - amount_conflict
        - period_conflict
        - superseded_by_correction
    meter_log_supports_claim:
      normal: supports_claim_amount_period_site
      mutations:
        - missing_meter_log
        - stale_meter_log
        - partial_period
    projection_gate:
      normal: allowed_after_receipt
      mutations:
        - blocked_by_rfi
        - blocked_by_unresolved_binding
        - blocked_by_conflicting_evidence

invariants:
  - code: invoice_exists
    check:
      kind: exists
      path: evidence.invoice
    pressure_targets:
      - evidence_presence
      - rfi_gate

  - code: meter_log_exists
    check:
      kind: exists
      path: evidence.meter_log
    pressure_targets:
      - evidence_presence
      - rfi_gate

  - code: invoice_amount_matches_claim
    depends_on:
      - invoice_exists
    check:
      kind: equals
      left: evidence.invoice.amount
      right: claim.activity.amount
    pressure_targets:
      - evidence_matching
      - public_projection_gate

  - code: invoice_period_matches_claim
    depends_on:
      - invoice_exists
    check:
      kind: equals
      left: evidence.invoice.period
      right: claim.period
    pressure_targets:
      - period_matching
      - public_projection_gate

  - code: meter_log_period_matches_claim
    depends_on:
      - meter_log_exists
    check:
      kind: equals
      left: evidence.meter_log.period
      right: claim.period
    pressure_targets:
      - stale_evidence
      - public_projection_gate

  - code: supplier_binding_resolved
    check:
      kind: resolves
      path: claim.supplier
    pressure_targets:
      - canonical_binding
      - public_projection_gate

mutation_cards:
  - id: invoice_amount_conflict
    op: replace
    path: evidence.invoice.amount
    from: 8400
    to: 8900
    target_syndrome:
      invoice_exists: P
      invoice_amount_matches_claim: F
      invoice_period_matches_claim: P
    semantic_delta:
      invoice.amount_relation: conflicts_with_claim
    pressure_targets:
      - evidence_matching
      - rfi_gate
      - public_projection_gate
    contract_intent:
      public_projection: absent
      rfi: present
      diagnostics_should_include:
        - amount_mismatch

  - id: stale_meter_log
    op: replace
    path: evidence.meter_log.period
    from: 2026-01
    to: 2025-12
    target_syndrome:
      meter_log_exists: P
      meter_log_period_matches_claim: F
    semantic_delta:
      meter_log.period_relation: previous_period
    pressure_targets:
      - stale_evidence
      - rfi_gate
      - public_projection_gate
    contract_intent:
      public_projection: absent
      rfi: present
      diagnostics_should_include:
        - stale_meter_log

  - id: supplier_alias_unresolved
    op: replace
    path: claim.supplier
    from: alpha_metal
    to: alpha_metal_co_unresolved_alias
    target_syndrome:
      supplier_binding_resolved: F
    semantic_delta:
      supplier.binding_relation: unresolved_alias
    pressure_targets:
      - canonical_binding
      - rfi_gate
      - public_projection_gate
    contract_intent:
      public_projection: absent
      rfi: present
      diagnostics_should_include:
        - supplier_alias_unresolved

  - id: missing_invoice
    op: delete
    path: evidence.invoice
    target_syndrome:
      invoice_exists: F
      invoice_amount_matches_claim: X
      invoice_period_matches_claim: X
    semantic_delta:
      invoice.presence_relation: missing
    pressure_targets:
      - evidence_presence
      - rfi_gate
      - public_projection_gate
    contract_intent:
      public_projection: absent
      rfi: present
      diagnostics_should_include:
        - missing_invoice

generated_output_policy:
  prepared: generated_candidate_bundles
  golden: hand_reviewed_regressions
  reports: generated_coverage_and_freeze_candidates
  authority_note: comp_owns_receipt_replay_and_projection_authority
